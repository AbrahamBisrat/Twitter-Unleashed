<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antigravity</title>
  <link rel="stylesheet" href="popup.css" />
</head>

<body>
  <!-- Header -->
  <header>
    <img src="img/twitter.png" alt="Antigravity" class="logo" />
    <div class="brand">
      <span class="brand-name">Antigravity</span>
      <span class="brand-sub">X Enhancement Suite</span>
    </div>
    <label class="toggle" title="Enable / disable all features">
      <input type="checkbox" id="masterToggle" checked />
      <span class="slider"></span>
    </label>
  </header>

  <!-- Feature Sections -->
  <main id="featureSections">

    <!-- ── Reply Sort Feature ──────────────────────────────────── -->
    <section class="feature-section" id="section-replySort">
      <div class="feature-header">
        <div>
          <h2 class="feature-title">Reply Sort</h2>
          <p class="feature-desc">Auto-apply your preferred sort order every time a tweet's replies load.</p>
        </div>
      </div>

      <div class="option-grid" id="sortOptions" role="radiogroup" aria-label="Reply sort preference">
        <button class="option-card" data-value="Likes" id="opt-Likes" role="radio" aria-checked="false">
          <span class="option-icon">❤️</span>
          <span class="option-label">Likes</span>
          <span class="option-hint">Most liked first</span>
        </button>
        <button class="option-card" data-value="Newest" id="opt-Newest" role="radio" aria-checked="false">
          <span class="option-icon">✨</span>
          <span class="option-label">Newest</span>
          <span class="option-hint">Latest replies first</span>
        </button>
        <button class="option-card" data-value="Relevant" id="opt-Relevant" role="radio" aria-checked="false">
          <span class="option-icon">💡</span>
          <span class="option-label">Relevant</span>
          <span class="option-hint">X's default ranking</span>
        </button>
      </div>
    </section>

    <!--
      ─────────────────────────────────────────────
      NEW FEATURE SECTIONS GO HERE
      Each feature section follows the pattern above:
      <section class="feature-section" id="section-yourFeatureId">
        ...controls...
      </section>
      ─────────────────────────────────────────────
    -->

  </main>

  <footer>
    <a href="https://github.com/AbrahamBisrat/Twitter-Unleashed" target="_blank" class="oss-link"
      title="View on GitHub">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
        <path
          d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z" />
      </svg>
      Open Source — Contribute on GitHub
    </a>
    <span class="oss-version">v1.0 · MIT License</span>
  </footer>

  <script src="popup.js"></script>
</body>

</html>
